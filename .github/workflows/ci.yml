name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: fmt
            command: cargo fmt --check
          - check: clippy
            command: cargo clippy -- -D warnings
          - check: test
            command: cargo test
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: ${{ matrix.command }}

  mcp-integration:
    name: mcp-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build obsidian-mcp
        run: make mcp-build

      - name: Create test vault
        run: make mcp-test-vault

      - name: tools/list returns all tools
        run: make mcp-test-tools-list

      - name: list_tags returns tags from both notes and inline
        run: make mcp-test-list-tags

      - name: search_tags finds occurrences of a tag
        run: make mcp-test-search-tags

      - name: read_note returns content and frontmatter
        run: make mcp-test-read-note

      - name: search_notes filters by content
        run: make mcp-test-search-notes

      - name: update_note adds tag to frontmatter
        run: make mcp-test-update-note

      - name: patch_note replaces string in body
        run: make mcp-test-patch-note

      - name: write_note creates a new note
        run: make mcp-test-write-note

      - name: rename_note renames note and updates backlinks
        run: make mcp-test-rename-note

      - name: read_note returns isError for nonexistent note
        run: make mcp-test-read-note-error

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: fmt
            command: cargo fmt --check
          - check: clippy
            command: cargo clippy -- -D warnings
          - check: test
            command: cargo test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: ${{ matrix.command }}
